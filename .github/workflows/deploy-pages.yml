name: Déploiement du site sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; annule les précédentes en attente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload de l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
